server:
  servlet:
    context-path: /api/v1/products
spring:
  datasource:
    url: ${PRODUCTS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/productsinventory} 
    username: ${PRODUCTS_DATASOURCE_USERNAME:productsAdmin}
    password: ${PRODUCTS_SPRING_DATASOURCE_PASSWORD:theProducts}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migrations
    schemas: public
    create-schemas: true
    baseline-on-migrate: true